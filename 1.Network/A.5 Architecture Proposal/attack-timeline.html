<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trickbot + Cobalt Strike — Attack Timeline · Project KAVACH</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; overflow: hidden; height: 100vh; }

  #toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; background: #1a1d2e;
    border-bottom: 1px solid #2d3148; height: 52px; flex-shrink: 0;
  }
  #toolbar h2 { font-size: 13px; color: #a5b4fc; font-weight: 600; flex: 1; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #3d4270;
    background: #252840; color: #c4caff; font-size: 12px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #3d4270; }

  #hint {
    text-align: center; font-size: 11px; color: #475569;
    padding: 4px; background: #13151f; border-bottom: 1px solid #1e2235;
  }

  #canvas-wrap {
    width: 100vw;
    height: calc(100vh - 72px);
    overflow: hidden;
    cursor: grab;
    position: relative;
    background: #0f1117;
  }
  #canvas-wrap.grabbing { cursor: grabbing; }
  #svg-container {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
</style>
</head>
<body>

<div id="toolbar">
  <h2>🔴 Trickbot + Cobalt Strike Attack Chain — 2021-05-26 · Meridian FinServe PCAP</h2>
  <button class="btn" onclick="resetView()">⟳ Reset</button>
  <button class="btn" onclick="zoom(1.25)">＋ Zoom In</button>
  <button class="btn" onclick="zoom(0.8)">－ Zoom Out</button>
  <button class="btn" onclick="fitAll()">⤢ Fit All</button>
</div>
<div id="hint">🖱 Drag to pan &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Touch supported</div>

<div id="canvas-wrap">
  <div id="svg-container"></div>
</div>

<script>
const events = [
  {

  },
  {

  },
  {
    t: 370, frame: "Frame 2910", section: "T+370s to T+484s",
    label: "First data exfiltration · POST 4911 bytes → 36.95.27.243 · URI: /rob87/DESKTOP-OG16DGY_.../90",
    phase: "Exfiltration", tactic: "Exfiltration Over C2 Channel", tid: "T1041",

  },
  {

  },
  {

    phase: "Discovery", tactic: "System Network Config Discovery", tid: "T1016",

  },
  {
    t: 783, frame: "Frame 13210", section: "T+521s to T+811s",
    label: "DC begins data exfiltration · POST /tot108/VICTORYPUNK-DC_.../90 · 7 min after workstation",
    phase: "Exfiltration", tactic: "Exfiltration Over C2 Channel", tid: "T1041",
    kill: "Actions on Objectives", color: "#dc2626", dot: "#fca5a5"
  },
  {
    t: 855, frame: "Frame 14878", section: "T+521s to T+811s",
    label: "DC queries myexternalip.com/raw · Second IP recon from DC",
    phase: "Discovery", tactic: "System Network Config Discovery", tid: "T1016",
    kill: "Reconnaissance", color: "#f97316", dot: "#fdba74"
  },
  {
    t: 3791, frame: "Frame 23179", section: "T+3784s to T+4809s",
    label: "Secondary C2 opens · DC sends 90+ GETs to antivirusupdaty.com · /logo?hour=true at ~5.4s intervals",
    phase: "Command & Control", tactic: "Dynamic Resolution", tid: "T1568",
    kill: "Command & Control", color: "#ef4444", dot: "#fca5a5"
  },
  {
    t: 4212, frame: "Frame 23758", section: "T+3784s to T+4809s",
    label: "Bulk credential dump begins · DC POSTs 16 batches to 5.199.162.3/as · Harvested creds sent in bulk",
    phase: "Credential Access", tactic: "OS Credential Dumping", tid: "T1003",
    kill: "Actions on Objectives", color: "#b91c1c", dot: "#fca5a5"
  },
  {
    t: 4750, frame: "Frame 26451", section: "T+3784s to T+4809s",
    label: "Cobalt Strike beacon still running · ~202s intervals maintained throughout capture",
    phase: "Command & Control", tactic: "Encrypted Channel", tid: "T1071.001",
    kill: "Command & Control", color: "#ef4444", dot: "#fca5a5"
  },
  {
    t: 4809, frame: "Frame 26644", section: "T+3784s to T+4809s",
    label: "Capture ends — intrusion still active · 28 TLS sessions to 37.228.70.134 total",
    phase: "Persistence", tactic: "Create/Modify System Process", tid: "T1543",
    kill: "Persistence", color: "#8b5cf6", dot: "#c4b5fd"
  }
];

// Layout constants
const CARD_W = 300;
const CARD_H = 130;
const COL_GAP = 340;
const PAD_LEFT = 160;
const PAD_TOP = 30;
const AXIS_Y = 280;
const SVG_H = 560;

let vx = 0, vy = 0, scale = 1;
let dragging = false, startX, startY, startVX, startVY;

function buildSVG() {
  const W = PAD_LEFT + (events.length - 1) * COL_GAP + CARD_W + 100;

  // Group events by section
  const sections = [...new Set(events.map(e => e.section))];
  const sectionColors = ["#1e2a3a","#1a2e2a","#2a1e2e","#2a2a1e"];

  let html = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${SVG_H}">`;

  // Defs
  html += `<defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>`;

  // Background
  html += `<rect width="${W}" height="${SVG_H}" fill="#0f1117"/>`;

  // Section backgrounds
  sections.forEach((sec, si) => {
    const secEvents = events.filter(e => e.section === sec);
    const firstI = events.indexOf(secEvents[0]);
    const lastI  = events.indexOf(secEvents[secEvents.length - 1]);
    const x1 = PAD_LEFT + firstI * COL_GAP - COL_GAP * 0.4;
    const x2 = PAD_LEFT + lastI  * COL_GAP + CARD_W * 0.6;
    html += `<rect x="${x1}" y="${PAD_TOP}" width="${x2-x1}" height="${SVG_H - PAD_TOP - 20}" rx="12" fill="${sectionColors[si % sectionColors.length]}" opacity="0.35"/>`;
    html += `<text x="${x1+12}" y="${PAD_TOP + 20}" font-size="11" fill="#94a3b8" font-weight="600">${sec}</text>`;
  });

  // Title
  html += `<text x="${W/2}" y="${PAD_TOP + 16}" font-size="14" fill="#a5b4fc" font-weight="700" text-anchor="middle">Trickbot + Cobalt Strike Attack Chain — 2021-05-26</text>`;

  // Legend
  const legendPhases = [
    {label:"C2 Beaconing", color:"#ef4444"},
    {label:"Reconnaissance", color:"#f97316"},
    {label:"Exfiltration", color:"#dc2626"},
    {label:"Lateral Movement", color:"#ff2020"},
    {label:"Credential Dump", color:"#b91c1c"},
    {label:"Persistence", color:"#8b5cf6"},
  ];
  let lx = PAD_LEFT;
  legendPhases.forEach(lp => {
    html += `<rect x="${lx}" y="${SVG_H - 28}" width="12" height="12" rx="3" fill="${lp.color}"/>`;
    html += `<text x="${lx+16}" y="${SVG_H - 18}" font-size="10" fill="#94a3b8">${lp.label}</text>`;
    lx += lp.label.length * 7 + 24;
  });

  // Axis line
  const axisX1 = PAD_LEFT - 20;
  const axisX2 = PAD_LEFT + (events.length - 1) * COL_GAP + 40;
  html += `<line x1="${axisX1}" y1="${AXIS_Y}" x2="${axisX2}" y2="${AXIS_Y}" stroke="#334155" stroke-width="2.5"/>`;

  // Axis arrow
  html += `<polygon points="${axisX2},${AXIS_Y} ${axisX2-8},${AXIS_Y-5} ${axisX2-8},${AXIS_Y+5}" fill="#475569"/>`;
  html += `<text x="${axisX2+8}" y="${AXIS_Y+4}" font-size="11" fill="#64748b">time →</text>`;

  // Axis label
  html += `<text x="${axisX1-5}" y="${AXIS_Y+4}" font-size="11" fill="#64748b" text-anchor="end">T(s)</text>`;

  // Time ticks
  const maxT = 4809;
  [0, 500, 1000, 1500, 2000, 2500, 3000, 3500, 4000, 4500, 4809].forEach(t => {
    const x = axisX1 + (t / maxT) * (axisX2 - axisX1);
    html += `<line x1="${x}" y1="${AXIS_Y - 6}" x2="${x}" y2="${AXIS_Y + 6}" stroke="#475569" stroke-width="1.5"/>`;
    html += `<text x="${x}" y="${AXIS_Y + 20}" font-size="9.5" fill="#475569" text-anchor="middle">${t}s</text>`;
  });

  // Events
  events.forEach((ev, i) => {
    const cx = PAD_LEFT + i * COL_GAP;
    const above = i % 2 === 0;
    const cardX = cx - CARD_W / 2;
    const cardY = above ? AXIS_Y - CARD_H - 55 : AXIS_Y + 55;
    const connY1 = above ? cardY + CARD_H : AXIS_Y + 12;
    const connY2 = above ? AXIS_Y - 12 : cardY;
    const midY = (connY1 + connY2) / 2;

    // Connector — curved
    html += `<path d="M${cx},${connY1} C${cx},${midY} ${cx},${midY} ${cx},${connY2}"
      stroke="${ev.color}" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.6"/>`;

    // Axis dot (outer glow)
    html += `<circle cx="${cx}" cy="${AXIS_Y}" r="11" fill="${ev.color}" opacity="0.25"/>`;
    html += `<circle cx="${cx}" cy="${AXIS_Y}" r="7" fill="${ev.color}" filter="url(#glow)"/>`;
    html += `<circle cx="${cx}" cy="${AXIS_Y}" r="4" fill="#0f1117"/>`;

    // Card shadow + body
    html += `<rect x="${cardX}" y="${cardY}" width="${CARD_W}" height="${CARD_H}" rx="10"
      fill="#1a1d2e" stroke="${ev.color}" stroke-width="1.8" filter="url(#shadow)"/>`;

    // Top accent bar
    html += `<rect x="${cardX}" y="${cardY}" width="${CARD_W}" height="6" rx="5" fill="${ev.color}" opacity="0.8"/>`;

    // Frame + time
    html += `<text x="${cardX + 12}" y="${cardY + 24}" font-size="11.5" font-weight="700" fill="${ev.dot}">${ev.frame} · T+${ev.t}s</text>`;

    // Label — word-wrapped into up to 3 lines of ~40 chars
    const words = ev.label.split(' ');
    const lines = [];
    let cur = '';
    words.forEach(w => {
      if ((cur + ' ' + w).trim().length <= 44) {
        cur = (cur + ' ' + w).trim();
      } else {
        if (cur) lines.push(cur);
        cur = w;
      }
    });
    if (cur) lines.push(cur);
    lines.slice(0, 3).forEach((ln, li) => {
      html += `<text x="${cardX + 12}" y="${cardY + 42 + li * 15}" font-size="10" fill="#cbd5e1">${ln}</text>`;
    });

    // Phase badge
    const badgeY = cardY + CARD_H - 34;
    html += `<rect x="${cardX + 8}" y="${badgeY}" width="${CARD_W * 0.48}" height="18" rx="5" fill="${ev.color}" opacity="0.18"/>`;
    html += `<text x="${cardX + CARD_W * 0.28}" y="${badgeY + 12}" font-size="9" fill="${ev.dot}" font-weight="700" text-anchor="middle">MITRE: ${ev.phase}</text>`;

    // Tactic badge
    const t2x = cardX + CARD_W * 0.52;
    html += `<rect x="${t2x}" y="${badgeY}" width="${CARD_W * 0.44}" height="18" rx="5" fill="#1e2a3a"/>`;
    html += `<text x="${t2x + CARD_W * 0.22}" y="${badgeY + 12}" font-size="9" fill="#64748b" text-anchor="middle">${ev.tid} · ${ev.kill}</text>`;
  });

  html += `</svg>`;
  document.getElementById('svg-container').innerHTML = html;
  applyTransform();
}

function applyTransform() {
  document.getElementById('svg-container').style.transform =
    `translate(${vx}px, ${vy}px) scale(${scale})`;
}

function resetView() { vx = 0; vy = 0; scale = 1; applyTransform(); }

function zoom(f) {
  scale = Math.min(3, Math.max(0.2, scale * f));
  applyTransform();
}

function fitAll() {
  const wrap = document.getElementById('canvas-wrap');
  const W = PAD_LEFT + (events.length - 1) * COL_GAP + CARD_W + 100;
  const H = SVG_H;
  const scaleX = wrap.clientWidth / W;
  const scaleY = wrap.clientHeight / H;
  scale = Math.min(scaleX, scaleY) * 0.95;
  vx = (wrap.clientWidth - W * scale) / 2;
  vy = (wrap.clientHeight - H * scale) / 2;
  applyTransform();
}

const wrap = document.getElementById('canvas-wrap');

wrap.addEventListener('mousedown', e => {
  dragging = true; startX = e.clientX; startY = e.clientY;
  startVX = vx; startVY = vy;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  vx = startVX + (e.clientX - startX);
  vy = startVY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('grabbing'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const f = e.deltaY < 0 ? 1.12 : 0.88;
  const newScale = Math.min(3, Math.max(0.2, scale * f));
  vx = mx - (mx - vx) * (newScale / scale);
  vy = my - (my - vy) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

// Touch
let touches = [];
wrap.addEventListener('touchstart', e => {
  touches = [...e.touches];
  e.preventDefault();
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && touches.length === 1) {
    vx += e.touches[0].clientX - touches[0].clientX;
    vy += e.touches[0].clientY - touches[0].clientY;
  } else if (e.touches.length === 2 && touches.length === 2) {
    const d0 = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    const d1 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = Math.min(3, Math.max(0.2, scale * (d1 / d0)));
  }
  touches = [...e.touches];
  applyTransform();
}, { passive: false });

buildSVG();
fitAll();
</script>
</body>
</html>
